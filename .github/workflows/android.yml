name: Android Build Debug (Safe)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Check project structure
      run: |
        echo "Checking required files..."
        ls -R

        if [ ! -f "settings.gradle" ]; then echo "❌ missing settings.gradle"; exit 1; fi
        if [ ! -f "gradlew" ]; then echo "❌ missing gradlew"; exit 1; fi
        if [ ! -d "gradle/wrapper" ]; then echo "❌ missing gradle wrapper folder"; exit 1; fi

        echo "✅ basic structure OK"

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
